components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # 基础类型
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        nickname:
          type: string
        avatar:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - username
        - email

    Board:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        title:
          type: string
        description:
          type: string
        owner_id:
          type: integer
        owner:
          $ref: '#/components/schemas/User'
        color:
          type: string
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        lists:
          type: array
          items:
            $ref: '#/components/schemas/List'
        swimlanes:
          type: array
          items:
            $ref: '#/components/schemas/Swimlane'
        members:
          type: array
          items:
            $ref: '#/components/schemas/BoardMember'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
      required:
        - id
        - title
        - owner_id

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        owner_id:
          type: integer
        owner:
          $ref: '#/components/schemas/User'
        color:
          type: string
        start_date:
          type: string
        target_date:
          type: string
        status:
          type: string
        priority:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        boards:
          type: array
          items:
            $ref: '#/components/schemas/Board'
      required:
        - id
        - title
        - owner_id

    Swimlane:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        name:
          type: string
        position:
          type: integer
        color:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - board_id
        - name
        - position

    List:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        title:
          type: string
        position:
          type: integer
        wip_limit:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
      required:
        - id
        - board_id
        - title
        - position

    ListWipStatus:
      type: object
      properties:
        list_id:
          type: integer
        list_title:
          type: string
        wip_limit:
          type: integer
          nullable: true
        current_count:
          type: integer
        is_over_limit:
          type: boolean
      required:
        - list_id
        - list_title
        - current_count
        - is_over_limit

    Card:
      type: object
      properties:
        id:
          type: integer
        list_id:
          type: integer
        swimlane_id:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
        position:
          type: integer
        due_date:
          type: string
          format: date-time
          nullable: true
        cover:
          type: string
        assignee_id:
          type: integer
          nullable: true
        assignee:
          $ref: '#/components/schemas/User'
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        checklist_items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'
        checklist_progress:
          type: object
          properties:
            total:
              type: integer
            completed:
              type: integer
      required:
        - id
        - list_id
        - title
        - position

    ChecklistItem:
      type: object
      properties:
        id:
          type: integer
        card_id:
          type: integer
        content:
          type: string
        completed:
          type: boolean
        position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - card_id
        - content
        - completed
        - position

    Label:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        name:
          type: string
        color:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - board_id
        - name
        - color

    Comment:
      type: object
      properties:
        id:
          type: integer
        card_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - card_id
        - user_id
        - content

    Attachment:
      type: object
      properties:
        id:
          type: integer
        card_id:
          type: integer
        file_name:
          type: string
        file_url:
          type: string
        file_size:
          type: integer
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - card_id
        - file_name
        - file_url

    BoardMember:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - observer
        joined_at:
          type: string
          format: date-time
      required:
        - id
        - board_id
        - user_id
        - role

    Activity:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        action:
          type: string
        entity_type:
          type: string
        entity_id:
          type: integer
        content:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - board_id
        - user_id
        - action
        - entity_type

    ActivityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    ListAutoAssignment:
      type: object
      properties:
        id:
          type: integer
        list_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
      required:
        - id
        - list_id
        - user_id

    ListTransitionRule:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        from_list_id:
          type: integer
        from_list:
          $ref: '#/components/schemas/List'
        to_list_id:
          type: integer
        to_list:
          $ref: '#/components/schemas/List'
      required:
        - id
        - board_id
        - from_list_id
        - to_list_id

    Webhook:
      type: object
      properties:
        id:
          type: integer
        board_id:
          type: integer
        url:
          type: string
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - board_id
        - url
        - events
        - is_active

    # CFD数据点
    CFDDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        list_counts:
          type: object
          additionalProperties:
            type: integer
      required:
        - date
        - list_counts

    CFDResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CFDDataPoint'
        lists:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              color:
                type: string
      required:
        - data
        - lists

    CycleTimeResponse:
      type: object
      properties:
        average_cycle_time:
          type: number
          description: 平均周期时间（小时）
        average_lead_time:
          type: number
          description: 平均前置时间（小时）
        card_count:
          type: integer
        cards:
          type: array
          items:
            type: object
            properties:
              card_id:
                type: integer
              card_title:
                type: string
              cycle_time:
                type: number
              lead_time:
                type: number
              completed_at:
                type: string
                format: date-time
      required:
        - average_cycle_time
        - average_lead_time
        - card_count

    ThroughputResponse:
      type: object
      properties:
        total_completed:
          type: integer
        daily_average:
          type: number
        weekly_data:
          type: array
          items:
            type: object
            properties:
              week_start:
                type: string
                format: date
              week_end:
                type: string
                format: date
              count:
                type: integer
      required:
        - total_completed
        - daily_average

