name: Backend CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'openapi.yaml'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'openapi.yaml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Generate API types
        working-directory: backend
        run: ~/go/bin/oapi-codegen -config oapi-codegen.yaml ../openapi.yaml

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Build
        working-directory: backend
        run: CGO_ENABLED=0 GOOS=linux go build -o kanban-backend ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/kanban-backend
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: ./backend

      - name: Deploy backend binary
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || 22 }}
          SOURCE: ./backend/kanban-backend
          TARGET: ${{ secrets.DEPLOY_PATH || '/opt/kanban' }}/backend
          ARGS: "-rltgoDzvO --exclude='.env'"
          SCRIPT_AFTER: |
            chmod +x ${{ secrets.DEPLOY_PATH || '/opt/kanban' }}/backend/kanban-backend
            if systemctl is-active --quiet kanban-api; then
              sudo systemctl restart kanban-api
              echo "Service restarted via systemctl"
            else
              echo "No systemd service found. Please restart manually or create a service."
            fi
          SCRIPT_AFTER_REQUIRED: true